services:
  postgres:
    image: postgres:16-alpine
    container_name: tarot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tarot}
      POSTGRES_USER: ${POSTGRES_USER:-tarot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tarot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tarot} -d ${POSTGRES_DB:-tarot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: tarot-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://tarot:tarot@postgres:5432/tarot}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./migrations:/migrations
      - ./alembic.ini:/alembic.ini:ro

  bot:
    build:
      context: ./bot
    container_name: tarot-bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://tarot:tarot@postgres:5432/tarot}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./bot:/app

  mini-app:
    build:
      context: ./mini-app
    container_name: tarot-mini-app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./mini-app:/app
      - mini_app_node_modules:/app/node_modules

volumes:
  postgres_data:
  mini_app_node_modules:
